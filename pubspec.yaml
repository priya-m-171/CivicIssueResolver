name: citizen
description: "A new Flutter project for the Citizen platform."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  flutter_dotenv: ^5.1.0
  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  http: ^1.6.0
  geolocator: ^14.0.2
  image_picker: ^1.2.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  cached_network_image: ^3.4.1
  shared_preferences: ^2.5.4
  intl: ^0.20.2
  permission_handler: ^12.0.1
  fl_chart: ^0.69.0
  uuid: ^4.5.1
  signature: ^5.5.0
  url_launcher: ^6.3.0
  csv: ^6.0.0
  path_provider: ^2.1.2
  share_plus: ^10.1.4
  supabase_flutter: ^2.12.0
  path: ^1.9.1
  flutter_svg: ^2.2.3
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^7.0.1
  crypto: ^3.0.7
  google_generative_ai: ^0.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - sources/logo.png
    - sources/logo.svg

dependency_overrides:
  objective_c: 9.2.0

flutter_icons:
  android: true
  ios: true
  image_path: "sources/app_icon.png"
  web:
    generate: true
    image_path: "sources/app_icon.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"
  windows:
    generate: true
    image_path: "sources/app_icon.png"
  macos:
    generate: true
    image_path: "sources/app_icon.png"
